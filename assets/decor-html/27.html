    <!-- v20.0 预构建装饰 · 原始艺术图腾 -->
    <div class="decor-layer">
      <!-- 图腾环形纹饰 - 左上 -->
      <div class="decor-ring" data-decor-pos="tl" style="position:absolute;top:40px;left:40px;width:80px;height:80px;border:1.5px solid rgba(var(--ACCENT_R),var(--ACCENT_G),var(--ACCENT_B),0.12);border-radius:50%;pointer-events:none"></div>

      <div class="decor-geo" data-decor-pos="tr" style="position:absolute;top:50px;right:50px;width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-bottom:24px solid rgba(var(--ACCENT_R),var(--ACCENT_G),var(--ACCENT_B),0.08);pointer-events:none"></div>
      <div class="decor-geo" data-decor-pos="bl" style="position:absolute;bottom:200px;left:30px;width:24px;height:24px;border:1px solid rgba(var(--ACCENT_R),var(--ACCENT_G),var(--ACCENT_B),0.12);transform:rotate(45deg);pointer-events:none"></div>
      <div class="decor-geo" data-decor-pos="br" style="position:absolute;bottom:60px;right:180px;width:20px;height:20px;border:1px solid rgba(var(--ACCENT_R),var(--ACCENT_G),var(--ACCENT_B),0.1);transform:rotate(45deg);pointer-events:none"></div>

      <div class="decor-stamp" data-decor-pos="tr" style="position:absolute;top:200px;right:55px;border:2px solid rgba(var(--ACCENT_R),var(--ACCENT_G),var(--ACCENT_B),0.12);border-radius:3px;padding:5px 10px;font-size:13px;font-weight:900;color:rgba(var(--ACCENT_R),var(--ACCENT_G),var(--ACCENT_B),0.08);letter-spacing:4px;transform:rotate(-18deg);pointer-events:none">轮回</div>

      <div class="scattered-text" style="position:absolute;top:18%;right:14%;font-family:'Noto Serif SC',serif;font-weight:900;color:rgba(var(--ACCENT_R),var(--ACCENT_G),var(--ACCENT_B),0.08);font-size:26px;letter-spacing:6px;animation:textDrift 10s ease-in-out infinite;animation-delay:0s;pointer-events:none">劳</div>

      <div class="scattered-text" style="position:absolute;top:82%;left:14%;font-family:'Noto Serif SC',serif;font-weight:900;color:rgba(var(--ACCENT_R),var(--ACCENT_G),var(--ACCENT_B),0.06);font-size:20px;letter-spacing:6px;animation:textDrift 10s ease-in-out infinite;animation-delay:6s;pointer-events:none">死</div>
      <!-- 章节符号 -->
      <div class="decor-ch-mark" data-decor-pos="tl" style="position:absolute;top:8px;left:50px;font-family:'Noto Serif SC',serif;font-weight:900;font-size:100px;line-height:1;color:rgba(var(--ACCENT_R),var(--ACCENT_G),var(--ACCENT_B),0.06);pointer-events:none">§</div>
      <div class="decor-ch-mark" data-decor-pos="br" style="position:absolute;bottom:50px;right:50px;font-family:'Noto Serif SC',serif;font-weight:900;font-size:110px;line-height:1;color:rgba(var(--ACCENT_R),var(--ACCENT_G),var(--ACCENT_B),0.05);transform:rotate(180deg);pointer-events:none">§</div>
      <!-- 水平雕刻线 -->
      <div class="decor-engrave" data-decor-pos="tl" style="position:absolute;top:30px;left:50px;right:50px;height:1px;background:repeating-linear-gradient(90deg,rgba(var(--ACCENT_R),var(--ACCENT_G),var(--ACCENT_B),0.05) 0,rgba(var(--ACCENT_R),var(--ACCENT_G),var(--ACCENT_B),0.05) 2px,transparent 2px,transparent 8px);pointer-events:none"></div>

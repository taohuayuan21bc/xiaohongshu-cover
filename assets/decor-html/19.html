    <div class="decor-layer">
      <div class="decor-glow" data-decor-pos="tr" style="position:absolute;top:40px;right:80px;width:120px;height:140px;background:radial-gradient(ellipse,rgba(var(--ACCENT_R),var(--ACCENT_G),var(--ACCENT_B),0.15) 0%,transparent 70%);border-radius:50%;filter:blur(3px);pointer-events:none"></div>

      <div class="decor-feather" data-decor-pos="tr" style="position:absolute;top:100px;right:60px;width:30px;height:60px;background:linear-gradient(135deg,rgba(var(--ACCENT_R),var(--ACCENT_G),var(--ACCENT_B),0.08) 0%,transparent 60%);border-radius:30% 70% 50% 50%;animation:featherDrift 12s ease-in-out infinite;pointer-events:none"></div>

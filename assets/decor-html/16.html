    <!-- v14.0 预构建装饰元素 -->
    <div class="decor-layer">
      <div class="decor-scan" style="position:absolute;width:100%;height:1px;background:rgba(var(--ACCENT_R),var(--ACCENT_G),var(--ACCENT_B),0.08);animation:scanMove 6s linear infinite;pointer-events:none"></div>
      <div class="decor-circuit" data-decor-pos="bl" style="position:absolute;bottom:220px;left:50px;width:100px;height:1px;background:rgba(var(--ACCENT_R),var(--ACCENT_G),var(--ACCENT_B),0.1);pointer-events:none"><span style="position:absolute;right:0;top:-3px;width:7px;height:7px;border-radius:50%;border:1px solid rgba(var(--ACCENT_R),var(--ACCENT_G),var(--ACCENT_B),0.2);pointer-events:none"></span></div>
      <div class="decor-beam" data-decor-pos="center" style="position:absolute;top:80px;left:50px;width:200px;height:300px;background:linear-gradient(135deg,rgba(var(--ACCENT_R),var(--ACCENT_G),var(--ACCENT_B),0.08) 0%,transparent 60%);transform:rotate(-20deg);pointer-events:none"></div>
      <div class="decor-geo" data-decor-pos="tl" style="position:absolute;top:120px;left:50px;width:200px;height:1px;background:rgba(var(--ACCENT_R),var(--ACCENT_G),var(--ACCENT_B),0.12);pointer-events:none"></div>
      <div class="decor-star" data-decor-pos="tr" style="position:absolute;top:60px;right:40px;width:3px;height:3px;background:var(--ACCENT);border-radius:50%;opacity:0.5;box-shadow:0 0 6px var(--ACCENT);pointer-events:none"></div>
      <div class="decor-block" data-decor-pos="tr" style="position:absolute;top:80px;right:60px;width:80px;height:80px;background:rgba(var(--ACCENT_R),var(--ACCENT_G),var(--ACCENT_B),0.04);border:1px solid rgba(var(--ACCENT_R),var(--ACCENT_G),var(--ACCENT_B),0.06);pointer-events:none"></div>
    </div>
